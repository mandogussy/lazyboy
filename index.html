<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lazyboy — 가구 가격 비교</title>
  <meta name="description" content="IKEA, 오늘의집, AliExpress, Temu 가구 가격을 한 번에 비교하세요." />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

  <style>
    /* ─── Tokens ─── */
    :root {
      --bg:          #FFFFFF;
      --text:        #111111;
      --text-muted:  #666666;
      --border:      #E5E5E5;
      --hover-bg:    #F5F5F5;
      --sidebar-w:   200px;
    }

    /* ─── Reset ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }
    ul { list-style: none; }

    /* ─── Layout ─── */
    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* ─── Sidebar ─── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 32px 24px;
      position: fixed;
      top: 0;
      left: 0;
      background: var(--bg);
      z-index: 100;
    }

    .sidebar-logo {
      margin-bottom: 40px;
    }

    .sidebar-logo h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .sidebar-logo p {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
      margin-top: 2px;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sidebar-nav a {
      display: block;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }

    .sidebar-nav a:hover,
    .sidebar-nav a.active {
      background: var(--hover-bg);
      color: var(--text);
    }

    /* ─── Main ─── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Top bar (mobile) ─── */
    .top-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 90;
    }

    .top-bar-logo {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* ─── Content ─── */
    .content {
      padding: 48px 48px 80px;
      max-width: 960px;
    }

    /* ─── Search ─── */
    .search-section {
      margin-bottom: 32px;
    }

    .search-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 12px;
      letter-spacing: 0.01em;
    }

    .search-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }

    .search-input {
      flex: 1;
      height: 44px;
      padding: 0 16px;
      font-family: 'Pretendard', -apple-system, sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-input::placeholder {
      color: #BBBBBB;
    }

    .search-input:focus {
      border-color: #999999;
    }

    .search-btn {
      height: 44px;
      padding: 0 20px;
      font-family: 'Pretendard', -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 600;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .search-btn:hover {
      background: #333333;
    }

    /* ─── Tabs ─── */
    .tabs-row {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }

    .tab-btn {
      padding: 10px 16px;
      font-family: 'Pretendard', -apple-system, sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .tab-btn:hover {
      color: var(--text);
    }

    .tab-btn.active {
      color: var(--text);
      border-bottom-color: var(--text);
    }

    /* ─── Results container ─── */
    .results-section {
      margin-top: 0;
    }

    /* Empty state */
    .empty-state {
      padding: 72px 0 40px;
      text-align: center;
    }

    .empty-state p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 420px;
      margin: 0 auto;
    }

    /* Results list */
    .results-list {
      display: none;
    }

    .results-list.visible {
      display: block;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Count line */
    .results-meta {
      padding: 14px 0 12px;
      font-size: 12px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    /* Table header */
    .result-header {
      display: grid;
      grid-template-columns: 90px 1fr 110px 80px;
      gap: 16px;
      align-items: center;
      padding: 10px 0 10px;
      border-bottom: 1px solid var(--border);
    }

    .result-header span {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .result-header span:last-child {
      text-align: right;
    }

    .result-header span:nth-child(3) {
      text-align: right;
    }

    /* Row */
    .result-row {
      display: grid;
      grid-template-columns: 90px 1fr 110px 80px;
      gap: 16px;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    .result-row:last-child {
      border-bottom: none;
    }

    .result-row:hover {
      background: var(--hover-bg);
      margin: 0 -12px;
      padding-left: 12px;
      padding-right: 12px;
    }

    .result-site {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-name {
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.4;
    }

    .result-price {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      text-align: right;
      white-space: nowrap;
    }

    .result-link {
      text-align: right;
    }

    .link-btn {
      display: inline-block;
      padding: 5px 10px;
      font-family: 'Pretendard', -apple-system, sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .link-btn:hover {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    /* No results within filter */
    .no-filter-results {
      padding: 40px 0;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ─── About section ─── */
    .about-section {
      display: none;
      padding: 48px 0;
    }

    .about-section.active {
      display: block;
    }

    .about-section h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    .about-section p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.8;
      max-width: 560px;
      margin-bottom: 12px;
    }

    /* ─── Mobile ─── */
    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }

      .top-bar {
        display: flex;
      }

      .main {
        margin-left: 0;
      }

      .content {
        padding: 24px 20px 60px;
      }

      .result-row,
      .result-header {
        grid-template-columns: 72px 1fr 90px 64px;
        gap: 10px;
      }

      .result-name {
        font-size: 13px;
      }

      .result-price {
        font-size: 13px;
      }
    }

    @media (max-width: 480px) {
      .result-header {
        display: none;
      }

      .result-row {
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto;
        gap: 4px 12px;
        padding: 12px 0;
      }

      .result-site {
        grid-column: 1;
        grid-row: 1;
        font-size: 11px;
      }

      .result-name {
        grid-column: 1;
        grid-row: 2;
        font-size: 13px;
      }

      .result-price {
        grid-column: 2;
        grid-row: 1;
        font-size: 13px;
        text-align: right;
      }

      .result-link {
        grid-column: 2;
        grid-row: 2;
        text-align: right;
      }
    }
  </style>
</head>
<body>

<div class="layout">

  <!-- ─── Sidebar ─── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>Lazyboy</h1>
      <p>가구 가격 비교</p>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="active" data-section="search">검색</a>
      <a href="#" data-section="about">소개</a>
    </nav>
  </aside>

  <!-- ─── Mobile top bar ─── -->
  <header class="top-bar">
    <span class="top-bar-logo">Lazyboy</span>
    <nav style="display:flex;gap:16px;">
      <a href="#" style="font-size:13px;font-weight:500;color:#666;" data-section="search">검색</a>
      <a href="#" style="font-size:13px;font-weight:500;color:#666;" data-section="about">소개</a>
    </nav>
  </header>

  <!-- ─── Main ─── -->
  <main class="main">

    <!-- Search section -->
    <section class="content" id="section-search">

      <div class="search-section">
        <p class="search-label">가구 검색</p>
        <div class="search-row">
          <input
            type="text"
            class="search-input"
            id="searchInput"
            placeholder="예: 책장, 소파, 식탁..."
            autocomplete="off"
          />
          <button class="search-btn" id="searchBtn">검색</button>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs-row" id="tabsRow">
        <button class="tab-btn active" data-filter="all">All</button>
        <button class="tab-btn" data-filter="IKEA">IKEA</button>
        <button class="tab-btn" data-filter="오늘의집">오늘의집</button>
        <button class="tab-btn" data-filter="AliExpress">AliExpress</button>
        <button class="tab-btn" data-filter="Temu">Temu</button>
      </div>

      <!-- Results -->
      <div class="results-section">

        <!-- Empty state (shown before search) -->
        <div class="empty-state" id="emptyState">
          <p>검색어를 입력하면 IKEA, 오늘의집, AliExpress, Temu 결과를 한 번에 확인할 수 있습니다.</p>
        </div>

        <!-- Results list (hidden before search) -->
        <div class="results-list" id="resultsList">
          <div class="results-meta" id="resultsMeta"></div>
          <div class="result-header">
            <span>사이트</span>
            <span>제품명</span>
            <span style="text-align:right">가격</span>
            <span style="text-align:right">링크</span>
          </div>
          <div id="resultsBody"></div>
        </div>

      </div>
    </section>

    <!-- About section -->
    <section class="content about-section" id="section-about">
      <h2>Lazyboy 소개</h2>
      <p>Lazyboy는 국내외 주요 가구 플랫폼의 가격을 한 페이지에서 비교할 수 있는 서비스입니다.</p>
      <p>IKEA, 오늘의집, AliExpress, Temu — 네 곳의 결과를 동시에 조회해 최적의 선택을 도와드립니다.</p>
      <p>현재 데모 버전으로 운영 중이며, 실제 검색 연동은 준비 중입니다.</p>
    </section>

  </main>
</div>

<script>
  // ─── Mock data ───
  const MOCK_PRODUCTS = [
    // IKEA
    { site: 'IKEA',       name: 'BILLY 책장 80x202cm',              price: 129000 },
    { site: 'IKEA',       name: 'POÄNG 암체어',                     price: 179000 },
    { site: 'IKEA',       name: 'LACK 사이드 테이블 55x55cm',        price: 29900  },
    { site: 'IKEA',       name: 'MALM 침대 프레임 퀸사이즈',          price: 349000 },
    // 오늘의집
    { site: '오늘의집',   name: '모던 패브릭 소파 2인용',             price: 389000 },
    { site: '오늘의집',   name: '원목 식탁 4인용 세트',              price: 520000 },
    { site: '오늘의집',   name: '북유럽 스타일 독서등',              price: 58000  },
    { site: '오늘의집',   name: '린넨 커튼 2폭 세트 230cm',          price: 76000  },
    // AliExpress
    { site: 'AliExpress', name: 'Minimalist Bookshelf 5-Tier',       price: 42000  },
    { site: 'AliExpress', name: 'Velvet Accent Chair Grey',          price: 97000  },
    { site: 'AliExpress', name: 'Folding Study Desk 100cm',          price: 34500  },
    { site: 'AliExpress', name: 'TV Console Cabinet 120cm Walnut',   price: 89000  },
    // Temu
    { site: 'Temu',       name: 'Foldable Storage Ottoman Beige',    price: 21000  },
    { site: 'Temu',       name: 'Rattan Side Table Round',           price: 18500  },
    { site: 'Temu',       name: 'Floating Wall Shelves Set of 3',    price: 14900  },
    { site: 'Temu',       name: 'Linen Throw Pillow Covers 4-Pack',  price: 12800  },
  ];

  // ─── State ───
  let currentFilter = 'all';
  let searchDone = false;

  // ─── Elements ───
  const searchInput  = document.getElementById('searchInput');
  const searchBtn    = document.getElementById('searchBtn');
  const emptyState   = document.getElementById('emptyState');
  const resultsList  = document.getElementById('resultsList');
  const resultsMeta  = document.getElementById('resultsMeta');
  const resultsBody  = document.getElementById('resultsBody');
  const tabBtns      = document.querySelectorAll('.tab-btn');

  // ─── Format price ───
  function formatPrice(n) {
    return '₩' + n.toLocaleString('ko-KR');
  }

  // ─── Render rows ───
  function renderRows() {
    if (!searchDone) return;

    const filtered = currentFilter === 'all'
      ? [...MOCK_PRODUCTS].sort((a, b) => a.price - b.price)
      : MOCK_PRODUCTS.filter(p => p.site === currentFilter);

    resultsMeta.textContent = filtered.length + '개 결과';

    if (filtered.length === 0) {
      resultsBody.innerHTML = '<div class="no-filter-results">해당 사이트 결과가 없습니다.</div>';
      return;
    }

    resultsBody.innerHTML = filtered.map(p => `
      <div class="result-row">
        <span class="result-site">${escapeHtml(p.site)}</span>
        <span class="result-name">${escapeHtml(p.name)}</span>
        <span class="result-price">${formatPrice(p.price)}</span>
        <span class="result-link"><a href="#" class="link-btn" onclick="return false;">바로가기</a></span>
      </div>
    `).join('');
  }

  // ─── Escape HTML ───
  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ─── Search ───
  function doSearch() {
    const query = searchInput.value.trim();
    if (!query) {
      searchInput.focus();
      searchInput.style.borderColor = '#999';
      setTimeout(() => { searchInput.style.borderColor = ''; }, 1000);
      return;
    }

    searchDone = true;
    emptyState.style.display = 'none';
    resultsList.classList.add('visible');
    renderRows();
  }

  searchBtn.addEventListener('click', doSearch);
  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  // ─── Tabs ───
  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tabBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      if (searchDone) renderRows();
    });
  });

  // ─── Nav (sidebar + mobile) ───
  const sectionSearch = document.getElementById('section-search');
  const sectionAbout  = document.getElementById('section-about');
  const allNavLinks   = document.querySelectorAll('[data-section]');

  allNavLinks.forEach(link => {
    link.addEventListener('click', e => {
      e.preventDefault();
      const target = link.dataset.section;

      // Update active state in sidebar
      document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
      document.querySelectorAll('.sidebar-nav a[data-section="' + target + '"]').forEach(a => a.classList.add('active'));

      if (target === 'search') {
        sectionSearch.style.display = '';
        sectionAbout.classList.remove('active');
      } else {
        sectionSearch.style.display = 'none';
        sectionAbout.classList.add('active');
      }
    });
  });
</script>
</body>
</html>
