<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lazyboy — 가구 가격 비교</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white:#FFFFFF; --black:#111111; --bg:#F8F8F8;
      --border:#E5E5E5; --muted:#888; --mid:#444; --chip:#F2F2F2;
      --radius:10px; --sidebar:200px;
      --font:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
    }
    html,body { height:100%; font-family:var(--font); background:var(--bg); color:var(--black); font-size:14px; line-height:1.5; }
    .layout { display:flex; min-height:100vh; }

    /* Sidebar */
    .sidebar {
      width:var(--sidebar); background:var(--white); border-right:1px solid var(--border);
      position:fixed; top:0; left:0; height:100vh;
      display:flex; flex-direction:column; padding:24px 0; z-index:100;
    }
    .sidebar-logo { padding:0 20px 24px; border-bottom:1px solid var(--border); }
    .sidebar-logo h1 { font-size:18px; font-weight:700; letter-spacing:-0.5px; }
    .sidebar-logo span { font-size:11px; color:var(--muted); display:block; margin-top:2px; }
    .sidebar-nav { padding:16px 0; flex:1; }
    .nav-item { display:block; padding:10px 20px; font-size:13px; font-weight:500; color:var(--mid); text-decoration:none; cursor:pointer; transition:background .15s,color .15s; }
    .nav-item:hover,.nav-item.active { background:var(--bg); color:var(--black); }
    .sidebar-footer { padding:16px 20px; border-top:1px solid var(--border); }
    .sidebar-footer a { font-size:12px; color:var(--muted); text-decoration:none; }
    .sidebar-footer a:hover { color:var(--black); }

    /* Main */
    .main { margin-left:var(--sidebar); flex:1; padding:40px 40px 80px; }

    /* Hero */
    .hero { margin-bottom:32px; }
    .hero h2 { font-size:26px; font-weight:700; letter-spacing:-0.8px; margin-bottom:6px; }
    .hero p { font-size:13px; color:var(--muted); margin-bottom:20px; }
    .search-row { display:flex; gap:8px; max-width:640px; }
    .search-input {
      flex:1; height:44px; border:1px solid var(--border); border-radius:var(--radius);
      padding:0 16px; font-family:var(--font); font-size:14px;
      background:var(--white); outline:none; transition:border-color .15s;
    }
    .search-input:focus { border-color:var(--black); }
    .search-input::placeholder { color:var(--muted); }
    .search-btn {
      height:44px; padding:0 22px; background:var(--black); color:var(--white);
      border:none; border-radius:var(--radius); font-family:var(--font);
      font-size:14px; font-weight:600; cursor:pointer; transition:background .15s; white-space:nowrap;
    }
    .search-btn:hover { background:#333; }
    .search-btn:disabled { background:#999; cursor:not-allowed; }

    /* Filters */
    .filter-section { margin-bottom:24px; }
    .filter-label { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.5px; text-transform:uppercase; margin-bottom:10px; }
    .filter-tabs { display:flex; gap:8px; flex-wrap:wrap; }
    .filter-tab {
      height:34px; padding:0 16px; border:1px solid var(--border); border-radius:100px;
      background:var(--white); color:var(--mid); font-family:var(--font);
      font-size:13px; font-weight:500; cursor:pointer; transition:all .15s;
    }
    .filter-tab:hover { border-color:var(--black); color:var(--black); }
    .filter-tab.active { background:var(--black); border-color:var(--black); color:var(--white); }
    .sub-filters { display:none; gap:8px; margin-top:10px; flex-wrap:wrap; }
    .sub-filters.visible { display:flex; }
    .sub-filter {
      height:30px; padding:0 14px; border:1px solid var(--border); border-radius:100px;
      background:var(--chip); color:var(--mid); font-family:var(--font);
      font-size:12px; font-weight:500; cursor:pointer; transition:all .15s;
    }
    .sub-filter:hover { border-color:var(--black); color:var(--black); }
    .sub-filter.active { background:var(--black); border-color:var(--black); color:var(--white); }

    /* Loading */
    .loading-state { display:none; padding:60px 0; text-align:center; }
    .loading-state.visible { display:block; }
    .spinner { width:24px; height:24px; border:2px solid var(--border); border-top-color:var(--black); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 12px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-state p { font-size:13px; color:var(--muted); }

    /* Results */
    .results-section { display:none; animation:fadeUp .2s ease; }
    .results-section.visible { display:block; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .platform-tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:16px; overflow-x:auto; gap:0; }
    .platform-tab {
      height:40px; padding:0 14px; border:none; background:none; font-family:var(--font);
      font-size:13px; font-weight:500; color:var(--muted); cursor:pointer;
      border-bottom:2px solid transparent; margin-bottom:-1px; white-space:nowrap;
      transition:color .15s,border-color .15s;
    }
    .platform-tab:hover { color:var(--black); }
    .platform-tab.active { color:var(--black); border-bottom-color:var(--black); }

    .results-meta { font-size:12px; color:var(--muted); margin-bottom:12px; }
    .results-meta strong { color:var(--black); }
    .live-badge { display:inline-block; margin-left:8px; padding:1px 7px; border-radius:100px; font-size:10px; font-weight:600; background:var(--black); color:var(--white); vertical-align:middle; }

    .result-list { display:flex; flex-direction:column; gap:8px; }

    /* Result row: platform | name | shipping | delivery | price | button */
    .result-row {
      display:grid;
      grid-template-columns: 100px 1fr 160px 150px 130px 90px;
      align-items:center; gap:16px;
      background:var(--white); border:1px solid var(--border);
      border-radius:var(--radius); padding:14px 20px;
      transition:background .12s,border-color .12s;
    }
    .result-row:hover { background:#FAFAFA; border-color:#D0D0D0; }

    .platform-badge {
      display:inline-block; padding:3px 10px; border:1px solid var(--border);
      border-radius:6px; font-size:11px; font-weight:600; color:var(--mid);
      background:var(--chip); text-align:center; white-space:nowrap;
    }
    .platform-badge.live { border-color:var(--black); color:var(--black); background:var(--white); }

    .product-name { font-size:14px; font-weight:500; color:var(--black); }
    .product-sub { font-size:11px; color:var(--muted); margin-top:2px; }

    /* Shipping */
    .shipping-col { font-size:12px; }
    .shipping-free { color:var(--black); font-weight:600; }
    .shipping-paid { color:var(--mid); }
    .shipping-install { color:var(--black); font-weight:600; }

    /* Delivery type badge */
    .delivery-badge {
      display:inline-flex; align-items:center; gap:4px;
      padding:4px 10px; border-radius:100px;
      font-size:11px; font-weight:600; white-space:nowrap;
    }
    .delivery-express      { background:var(--black); color:var(--white); }
    .delivery-installation { background:var(--chip); color:var(--black); border:1px solid var(--black); }
    .delivery-standard     { background:var(--chip); color:var(--mid); border:1px solid var(--border); }
    .delivery-slow         { background:var(--chip); color:var(--muted); border:1px solid var(--border); }

    /* Price */
    .price-col { text-align:right; }
    .price-total { font-size:15px; font-weight:700; }
    .price-sub { font-size:11px; color:var(--muted); margin-top:2px; }

    .buy-btn {
      display:block; height:34px; line-height:32px; padding:0 14px;
      background:var(--white); color:var(--black); border:1px solid var(--black);
      border-radius:8px; font-family:var(--font); font-size:12px; font-weight:600;
      cursor:pointer; text-align:center; text-decoration:none;
      transition:background .15s,color .15s; white-space:nowrap;
    }
    .buy-btn:hover { background:var(--black); color:var(--white); }

    /* Empty */
    .empty-state { padding:80px 0; text-align:center; }
    .empty-state p { font-size:14px; color:var(--muted); line-height:2; }

    /* Mobile */
    .mobile-header { display:none; }
    @media (max-width:960px) {
      .sidebar { display:none; }
      .main { margin-left:0; padding:20px 16px 60px; }
      .mobile-header { display:flex; align-items:center; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); }
      .result-row { grid-template-columns:1fr 1fr; grid-template-rows:auto auto auto auto; gap:10px; }
      .result-row>*:nth-child(1) { grid-column:1; }
      .result-row>*:nth-child(2) { grid-column:1/-1; }
      .result-row>*:nth-child(3) { grid-column:1; }
      .result-row>*:nth-child(4) { grid-column:2; justify-self:end; }
      .result-row>*:nth-child(5) { grid-column:1; }
      .result-row>*:nth-child(6) { grid-column:2; justify-self:end; }
      .buy-btn { width:100%; }
      .price-col { text-align:left; }
    }
  </style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>Lazyboy</h1>
      <span>가구 가격 비교</span>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active">검색</a>
      <a class="nav-item">소개</a>
    </nav>
    <div class="sidebar-footer">
      <a href="https://github.com/mandogussy/lazyboy" target="_blank">GitHub</a>
    </div>
  </aside>

  <main class="main">
    <div class="mobile-header">
      <strong style="font-size:17px;font-weight:700;letter-spacing:-0.5px;">Lazyboy</strong>
    </div>

    <section class="hero">
      <h2>모든 가구를 한번에 비교</h2>
      <p>IKEA · 오늘의집 · Coupang · 마켓비 · 29CM · MUJI · Desker · AliExpress · Temu · Hanssem</p>
      <div class="search-row">
        <input class="search-input" id="searchInput" type="text" placeholder="소파, 책장, 테이블 등 검색어 입력" autocomplete="off" />
        <button class="search-btn" id="searchBtn">검색하기</button>
      </div>
    </section>

    <section class="filter-section">
      <div class="filter-label">필터</div>
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">전체</button>
        <button class="filter-tab" data-filter="size">공간에 맞게</button>
        <button class="filter-tab" data-filter="popular">인기순</button>
        <button class="filter-tab" data-filter="price">가격대</button>
        <button class="filter-tab" data-filter="delivery_express">로켓 배송</button>
        <button class="filter-tab" data-filter="delivery_installation">전문 설치</button>
      </div>
      <div class="sub-filters" id="sizeFilters">
        <button class="sub-filter active" data-size="all">전체 사이즈</button>
        <button class="sub-filter" data-size="600">600mm</button>
        <button class="sub-filter" data-size="900">900mm</button>
        <button class="sub-filter" data-size="1000">1000mm</button>
        <button class="sub-filter" data-size="1200">1200mm</button>
      </div>
      <div class="sub-filters" id="priceFilters">
        <button class="sub-filter active" data-price="all">전체</button>
        <button class="sub-filter" data-price="30000">3만원 이하</button>
        <button class="sub-filter" data-price="100000">10만원 이하</button>
        <button class="sub-filter" data-price="300000">30만원 이하</button>
        <button class="sub-filter" data-price="500000">50만원 이하</button>
      </div>
    </section>

    <div class="empty-state" id="emptyState">
      <p>검색어를 입력하면<br>10개 사이트 결과를 한번에 확인할 수 있습니다</p>
    </div>

    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <p id="loadingMsg">10개 사이트에서 검색 중...</p>
      <p id="coldStartMsg" style="font-size:11px;color:#aaa;margin-top:6px;display:none;">첫 검색은 서버 시작으로 30초 정도 걸릴 수 있습니다</p>
    </div>

    <section class="results-section" id="resultsSection">
      <div class="platform-tabs" id="platformTabs">
        <button class="platform-tab active" data-platform="all">전체</button>
        <button class="platform-tab" data-platform="IKEA">IKEA</button>
        <button class="platform-tab" data-platform="오늘의집">오늘의집</button>
        <button class="platform-tab" data-platform="Coupang">Coupang</button>
        <button class="platform-tab" data-platform="마켓비">마켓비</button>
        <button class="platform-tab" data-platform="29CM">29CM</button>
        <button class="platform-tab" data-platform="MUJI">MUJI</button>
        <button class="platform-tab" data-platform="Desker">Desker</button>
        <button class="platform-tab" data-platform="AliExpress">AliExpress</button>
        <button class="platform-tab" data-platform="Temu">Temu</button>
        <button class="platform-tab" data-platform="Hanssem">Hanssem</button>
      </div>
      <div class="results-meta" id="resultsMeta"></div>
      <div class="result-list" id="resultList"></div>
    </section>
  </main>
</div>

<script>
// ← Render 배포 후 실제 URL로 교체
const RENDER_API = "https://lazyboy-api.onrender.com";

// ── 어필리에이트 설정 ──────────────────────────────────────
// 1. partners.coupang.com 가입 후 파트너스 ID 입력
// 2. portals.aliexpress.com 가입 후 AFF ID 입력
const AFFILIATE = {
  coupang:    "",   // ← 예: "AF1234567"
  aliexpress: "",   // ← 예: "your_aff_id"
};

function applyAffiliate(url, platform) {
  if (!url || url === "#") return url;
  if (platform === "Coupang" && AFFILIATE.coupang) {
    const sep = url.includes("?") ? "&" : "?";
    return `${url}${sep}affiliate=coupang&subid=${AFFILIATE.coupang}`;
  }
  if (platform === "AliExpress" && AFFILIATE.aliexpress) {
    const sep = url.includes("?") ? "&" : "?";
    return `${url}${sep}aff_fcid=${AFFILIATE.aliexpress}`;
  }
  return url;
}

let allData = [];
let st = { platform:"all", filter:"all", subSize:"all", subPrice:"all" };

const fmt  = n => "₩" + n.toLocaleString("ko-KR");

function deliveryBadge(type, days) {
  if (type === "express")      return [`로켓배송 (${days}일)`, "delivery-express"];
  if (type === "installation") return ["전문 설치", "delivery-installation"];
  if (type === "slow")         return [`해외배송 (${days}일)`, "delivery-slow"];
  return [`${days}일 이내`, "delivery-standard"];
}

function shippingDisplay(item) {
  if (item.delivery_type === "installation") {
    return `<span class="shipping-install">${item.shipping_label || "전문 설치 포함"}</span>`;
  }
  if (item.shipping === 0) {
    return `<span class="shipping-free">${item.shipping_label || "무료배송"}</span>`;
  }
  return `<span class="shipping-paid">${item.shipping_label || fmt(item.shipping)}</span>`;
}

function filtered() {
  let d = [...allData];
  if (st.platform !== "all") d = d.filter(x => x.platform === st.platform);

  if (st.filter === "popular")              d = d.filter(x => x.popular);
  else if (st.filter === "delivery_express")      d = d.filter(x => x.delivery_type === "express");
  else if (st.filter === "delivery_installation") d = d.filter(x => x.delivery_type === "installation");
  else if (st.filter === "size" && st.subSize !== "all") {
    const v = +st.subSize;
    d = d.filter(x => x.size > 0 && x.size >= v - 80 && x.size <= v + 80);
  } else if (st.filter === "price" && st.subPrice !== "all") {
    const max = +st.subPrice;
    d = d.filter(x => (x.price + x.shipping) <= max);
  }

  d.sort((a,b) => (a.price + a.shipping) - (b.price + b.shipping));
  return d;
}

function render() {
  const data = filtered();
  const liveCount = data.filter(x => x.live).length;
  document.getElementById("resultsMeta").innerHTML =
    `총 <strong>${data.length}개</strong> 결과` +
    (liveCount > 0 ? `<span class="live-badge">실시간 ${liveCount}개</span>` : "");

  const list = document.getElementById("resultList");
  if (!data.length) {
    list.innerHTML = `<div style="padding:48px 0;text-align:center;color:#888;font-size:13px;">조건에 맞는 결과가 없습니다</div>`;
    return;
  }

  list.innerHTML = data.map(x => {
    const [dText, dCls] = deliveryBadge(x.delivery_type, x.days);
    return `<div class="result-row">
      <span class="platform-badge${x.live ? " live" : ""}">${x.platform}</span>
      <div>
        <div class="product-name">${x.name}</div>
        <div class="product-sub">${x.size ? x.size + "mm" : ""}${x.popular ? " · 인기" : ""}${x.live ? " · 실시간" : ""}</div>
      </div>
      <div class="shipping-col">${shippingDisplay(x)}</div>
      <div><span class="delivery-badge ${dCls}">${dText}</span></div>
      <div class="price-col">
        <div class="price-total">${fmt(x.price + x.shipping)}</div>
        <div class="price-sub">상품 ${fmt(x.price)}</div>
      </div>
      <div><a class="buy-btn" href="${applyAffiliate(x.url || "#", x.platform)}" target="_blank" rel="noopener">바로가기</a></div>
    </div>`;
  }).join("");
}

async function doSearch(query) {
  document.getElementById("emptyState").style.display = "none";
  document.getElementById("resultsSection").classList.remove("visible");
  document.getElementById("loadingState").classList.add("visible");
  document.getElementById("searchBtn").disabled = true;
  document.getElementById("searchBtn").textContent = "검색 중...";

  // Show cold-start warning after 5 seconds
  const coldTimer = setTimeout(() => {
    document.getElementById("coldStartMsg").style.display = "block";
  }, 5000);

  try {
    const res  = await fetch(`${RENDER_API}/search?q=${encodeURIComponent(query)}`);
    clearTimeout(coldTimer);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    allData = (json.results && json.results.length > 0) ? json.results : LOCAL_MOCK;
  } catch {
    clearTimeout(coldTimer);
    // Render API unavailable — try Netlify function
    try {
      const res2 = await fetch(`/.netlify/functions/search?q=${encodeURIComponent(query)}`);
      const json2 = await res2.json();
      allData = (json2.results && json2.results.length > 0) ? json2.results : LOCAL_MOCK;
    } catch {
      allData = LOCAL_MOCK;
    }
  }
  document.getElementById("coldStartMsg").style.display = "none";

  document.getElementById("loadingState").classList.remove("visible");
  const rs = document.getElementById("resultsSection");
  rs.classList.remove("visible"); void rs.offsetWidth; rs.classList.add("visible");
  document.getElementById("searchBtn").disabled = false;
  document.getElementById("searchBtn").textContent = "검색하기";
  render();
}

// Local fallback mock
const LOCAL_MOCK = [
  { platform:"IKEA",      name:"BILLY 책장 80×202cm",         price:129000, shipping:0,     shipping_label:"무료배송",            delivery_type:"standard",     days:2, size:800,  popular:false, url:"#", live:false },
  { platform:"IKEA",      name:"KALLAX 선반 유닛 77×77cm",    price:89000,  shipping:0,     shipping_label:"무료배송",            delivery_type:"standard",     days:2, size:770,  popular:true,  url:"#", live:false },
  { platform:"IKEA",      name:"POANG 암체어",                 price:179000, shipping:0,     shipping_label:"무료배송",            delivery_type:"standard",     days:2, size:600,  popular:true,  url:"#", live:false },
  { platform:"IKEA",      name:"LACK 사이드테이블 55cm",       price:35000,  shipping:0,     shipping_label:"무료배송",            delivery_type:"standard",     days:2, size:550,  popular:false, url:"#", live:false },
  { platform:"오늘의집",  name:"모던 패브릭 소파 2인용",       price:389000, shipping:3000,  shipping_label:"3,000원",             delivery_type:"standard",     days:3, size:1200, popular:true,  url:"#", live:false },
  { platform:"오늘의집",  name:"원목 커피테이블 900mm",        price:159000, shipping:3000,  shipping_label:"3,000원",             delivery_type:"standard",     days:3, size:900,  popular:true,  url:"#", live:false },
  { platform:"Coupang",   name:"조립식 책장 5단 600mm",        price:39900,  shipping:0,     shipping_label:"무료배송 (로켓)",      delivery_type:"express",      days:1, size:600,  popular:true,  url:"#", live:false },
  { platform:"Coupang",   name:"1인 소파베드",                 price:89000,  shipping:0,     shipping_label:"무료배송 (로켓)",      delivery_type:"express",      days:1, size:900,  popular:true,  url:"#", live:false },

// Events
document.getElementById("searchBtn").addEventListener("click", () => {
  const q = document.getElementById("searchInput").value.trim();
  if (!q) { document.getElementById("searchInput").focus(); return; }
  doSearch(q);
});
document.getElementById("searchInput").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("searchBtn").click();
});
document.querySelectorAll(".filter-tab").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll(".filter-tab").forEach(x => x.classList.remove("active"));
  b.classList.add("active"); st.filter = b.dataset.filter;
  document.getElementById("sizeFilters").classList.toggle("visible", st.filter === "size");
  document.getElementById("priceFilters").classList.toggle("visible", st.filter === "price");
  render();
}));
document.querySelectorAll("#sizeFilters .sub-filter").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll("#sizeFilters .sub-filter").forEach(x => x.classList.remove("active"));
  b.classList.add("active"); st.subSize = b.dataset.size; render();
}));
document.querySelectorAll("#priceFilters .sub-filter").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll("#priceFilters .sub-filter").forEach(x => x.classList.remove("active"));
  b.classList.add("active"); st.subPrice = b.dataset.price; render();
}));
document.querySelectorAll(".platform-tab").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll(".platform-tab").forEach(x => x.classList.remove("active"));
  b.classList.add("active"); st.platform = b.dataset.platform; render();
}));
</script>
